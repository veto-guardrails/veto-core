services:
  inference:
    build: ./inference
    container_name: veto-inference
    environment:
      VETO_INJECTION_MODEL: protectai/deberta-v3-base-prompt-injection-v2
    expose:
      - "8000"
    networks:
      - veto
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: veto-gateway
    # Gateway resolves customer keys against cloud + Redis. This compose only
    # ships gateway + inference; bring up veto-cloud's deploy/docker-compose
    # for the cloud and redis services on the shared `veto` network, or point
    # these URLs at your own deployment.
    environment:
      VETO_INFERENCE_URL: http://inference:8000
      # All three control-plane env vars are optional. The gateway enforces
      # them at boot when VETO_STATIC_KEYS is empty (managed mode); when
      # VETO_STATIC_KEYS is set, the gateway runs standalone and these go
      # unused. Compose can't conditionally require them, so we let the Go
      # code be the source of truth and use `:-` (empty default) here.
      VETO_REDIS_URL: ${VETO_REDIS_URL:-}
      VETO_CLOUD_URL: ${VETO_CLOUD_URL:-}
      VETO_CLOUD_INTERNAL_TOKEN: ${VETO_CLOUD_INTERNAL_TOKEN:-}
      VETO_STATIC_KEYS: ${VETO_STATIC_KEYS:-}
    depends_on:
      inference:
        condition: service_healthy
    ports:
      - "${VETO_HOST_PORT:-8088}:8080"
    networks:
      - veto
    restart: unless-stopped

networks:
  veto:
    name: veto
