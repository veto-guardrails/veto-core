# tygo config — generates veto-web's TypeScript view of veto-core/config.
#
# Run from this directory:
#   go run github.com/gzuidhof/tygo@latest generate
#
# Output (analytics.ts) is committed. CI gate:
#   tygo generate && git diff --exit-code config/analytics.ts
#
# Only the analytics wire types are exposed today. KeyCacheEntry and the
# argon2 params are gateway/cloud-internal; web has no business reading
# them. Tier values are sourced from tiers.json directly (TS JSON import).

packages:
  - path: "github.com/veto-guardrails/veto-core/config"
    output_path: "analytics.ts"
    include_files:
      - "analytics.go"
    type_mappings:
      time.Time: "string"
    frontmatter: |
      // Code generated by tygo. DO NOT EDIT.
      // Source: veto-core/config/analytics.go
      // Regenerate: cd veto-core/config && go run github.com/gzuidhof/tygo@latest generate
